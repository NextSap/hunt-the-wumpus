{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}
<div id="main-div">
    <div id="left-div">
        <p>HUNT THE WUMPUS</p>
        <img src="{{ url_for('static', filename='images/wumpus.png') }}"
             alt="Wumpus"
             height="200"
             width="200"/>
    </div>
    <div id="right-div">
        <form id="form" method="post">
            <h1>Login</h1>
            <label for="username">Username</label>
            <input id="username"
                   name="username"
                   placeholder="Enter your username"
                   pattern="^[a-zA-Z0-9]+$"
                   title="Use letters and/or numbers only"
                   required/>
            <small>Use letters and/or numbers only</small>
            <label for="password">Password</label>
            <input id="password"
                   name="password"
                   type="password"
                   placeholder="Enter your password"
                   pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,50}$"
                   title="Use at least 8 characters and max 50, 1 uppercase, 1 lowercase"
                   required/>
            <small>Use at least 8 characters, 1 uppercase, 1 lowercase</small>
            <p id="form_error">{{login_error}}</p>
            <button type="submit">Login</button>
            <a href="/register">Not registered yet ? Create an account</a>
        </form>
    </div>
</div>
{% endblock %}
